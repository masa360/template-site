<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F7F4F0">
  <title>LP テンプレート選択</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="page">

    <!-- ヘッダー -->
    <header class="header">
      <span class="header-eyebrow">LP TEMPLATE</span>
      <h1 class="header-title">テンプレートを選ぶ</h1>
      <p class="header-sub">番号を LINE で送るとテンプレートが届きます</p>
    </header>

    <!-- テンプレート一覧 -->
    <section class="section">
      <p class="section-label">テンプレート一覧</p>
      <p class="templates-hint">タップするとサンプルを確認できます</p>
      <div class="templates-grid" id="templates-grid"></div>
    </section>

    <!-- デザイン参照元 -->
    <section class="section section-note">
      <div class="note-card">
        <p class="note-source">
          デザイン参照元
          <a href="https://sankoudesign.com/" target="_blank" rel="noopener noreferrer" class="note-link">SANKOU!</a>
        </p>
      </div>
    </section>

    <!-- アクションバー（画面下固定） -->
    <div class="action-bar" id="action-bar" hidden>
      <div class="action-num">
        <span class="action-num-label">選択中</span>
        <span class="action-num-value" id="action-num-value">—</span>
      </div>
      <button type="button" class="btn-preview-open" id="btn-preview-open">サンプルを見る</button>
      <a class="btn-line" id="btn-line" href="#" target="_blank" rel="noopener noreferrer">
        <span class="btn-line-icon"></span>
        <span>LINE で送る</span>
      </a>
    </div>

  </div>

  <!-- モーダル（ボトムシート） -->
  <div class="modal" id="modal" hidden aria-modal="true" role="dialog" aria-label="サンプル LP プレビュー">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-sheet" id="modal-sheet">

      <div class="modal-handle"></div>

      <div class="modal-header">
        <div class="modal-header-info">
          <span class="modal-num" id="modal-num">No.1</span>
          <span class="modal-name" id="modal-name"></span>
        </div>
        <button type="button" class="modal-close" id="modal-close" aria-label="閉じる">
          <span class="modal-close-icon"></span>
        </button>
      </div>

      <div class="modal-body">
        <div class="modal-loading" id="modal-loading">
          <div class="loading-spinner"></div>
          <p>読み込み中…</p>
        </div>
        <iframe
          id="modal-iframe"
          class="modal-iframe"
          src="about:blank"
          title="LP サンプルプレビュー"
          scrolling="yes"
          loading="lazy"
        ></iframe>
      </div>

      <div class="modal-footer">
        <p class="modal-footer-note">この番号を LINE で送ると案内が届きます</p>
        <a class="btn-line-modal" id="btn-line-modal" href="#" target="_blank" rel="noopener noreferrer">
          <span class="btn-line-icon"></span>
          <span id="btn-line-modal-text">LINE で送る</span>
        </a>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
