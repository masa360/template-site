<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#faf7f2">
  <title>LPテンプレートを選ぶ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="page">

    <header class="header">
      <p class="header-eyebrow">LP Template</p>
      <h1 class="header-title">ジャンルを選んでください</h1>
    </header>

    <!-- ① ジャンル選択 -->
    <div class="genre-row">
      <button class="genre-btn" data-genre="butuhan">
        <span class="genre-icon">🛒</span>
        <span class="genre-label">物販</span>
      </button>
      <button class="genre-btn" data-genre="biyou">
        <span class="genre-icon">✨</span>
        <span class="genre-label">美容</span>
      </button>
      <button class="genre-btn" data-genre="insyoku">
        <span class="genre-icon">☕</span>
        <span class="genre-label">飲食</span>
      </button>
      <button class="genre-btn" data-genre="school">
        <span class="genre-icon">📚</span>
        <span class="genre-label">スクール</span>
      </button>
      <button class="genre-btn" data-genre="taiken">
        <span class="genre-icon">🎯</span>
        <span class="genre-label">体験</span>
      </button>
    </div>

    <!-- ② スケルトン一覧（ジャンル選択後に表示） -->
    <div class="templates-wrap" id="templates-wrap" hidden>
      <p class="templates-heading" id="templates-heading"></p>
      <p class="templates-hint">タップするとサンプルが見れます</p>
      <div class="templates-grid" id="templates-grid"></div>
    </div>

    <!-- アクションバー（ポップアップ外から再送信できるよう残す） -->
    <div class="action-bar" id="action-bar" hidden>
      <div class="action-num">
        <span class="action-num-label">選択中</span>
        <span class="action-num-value" id="action-num-value">—</span>
      </div>
      <button type="button" class="btn-preview-open" id="btn-preview-open">
        <span>サンプルを見る</span>
      </button>
      <a class="btn-line" id="btn-line" href="#" target="_blank" rel="noopener noreferrer">
        <span class="btn-line-icon"></span>
        <span>LINEで送る</span>
      </a>
    </div>

  </div>

  <!-- ポップアップモーダル（サンプルLPプレビュー） -->
  <div class="modal" id="modal" hidden aria-modal="true" role="dialog" aria-label="サンプルLPプレビュー">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-sheet" id="modal-sheet">

      <!-- モーダルヘッダー -->
      <div class="modal-header">
        <div class="modal-drag-handle"></div>
        <div class="modal-header-info">
          <span class="modal-num" id="modal-num">No.1</span>
          <span class="modal-name" id="modal-name">シンプル</span>
        </div>
        <button type="button" class="modal-close" id="modal-close" aria-label="閉じる">
          <span class="modal-close-icon"></span>
        </button>
      </div>

      <!-- iframeプレビュー -->
      <div class="modal-body">
        <div class="modal-loading" id="modal-loading">
          <div class="loading-spinner"></div>
          <p>読み込み中...</p>
        </div>
        <iframe
          id="modal-iframe"
          class="modal-iframe"
          src="about:blank"
          title="LPサンプルプレビュー"
          scrolling="yes"
          loading="lazy"
        ></iframe>
      </div>

      <!-- モーダルフッター：LINEボタン -->
      <div class="modal-footer">
        <a class="btn-line-modal" id="btn-line-modal" href="#" target="_blank" rel="noopener noreferrer">
          <span class="btn-line-icon"></span>
          <span id="btn-line-modal-text">この番号をLINEで送る</span>
        </a>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
